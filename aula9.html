<!DOCTYPE html>
<html lang="pt-br">
<head>

    <style>
body{
    background-color: rgb(0, 217, 255);

}

    color:rgb(37, 77, 255);

    font-family: cursive;
}

<body>
    
    <img src="download.jpeg" alt="download.jpeg">


<header>



</header>
<main>
    <h1> cadastro clientes</h1>
</main>

<form>
    
<label for= "nome"> nome:</label>
<input type="text" id="nome" placeholder= "cleiton da silvassauro" required class="input-texto">

<label for= "CPF"> CPF:</label>
<input type="text" placeholder= "000.000.000-00" required class="input-texto">

<label for= "dt_nasc"> data de nascimento:</label>
<input type="date" id="dt_nasc" required class="input-texto">

<label for= "email"> Email:</label>
<input type="email" id="email" placeholder= "exemplo fulano@gmail" required class="input-texto">

<label for= "celular"> Celular:</label>
<input type="tel" id="celular" placeholder= "(00) 0000-0000" required class="input-texto">

<label for= "CEP"> CEP:</label>
<input type="text" id="CEP" placeholder= "000-000-00" required class="input-texto">

<label for= "RUA"> RUA:</label>
<input type="text" id="RUA" placeholder= "alvares pedro" required class="input-texto">

<label for= "NÚMERO"> NÚMERO:</label>
<input type="text" id="celular" placeholder= "000" required class="input-texto">


<label for= "BAIRRO"> BAIRRO:</label>
<input type="text" id="BAIRRO" placeholder= "ex: cara-cara" required class="input-texto">

<label for= "CIDADE"> CIDADE:</label>
<input type="text" id="CIDADE" placeholder= " ex: curitiba" required class="input-texto">

<label for= "ESTADO(UF)"> ESTADO(UF):</label>
<input type="text" id="ESTADO(UF)" placeholder= "(00)" required class="input-texto">

<label for= "senha"> senha:</label>
<input type="text" id="senha" placeholder= " ex: 9456" required class="input-texto">


<input type="submit" value="enviar cadastro" class="btn_enviar">

</form>

<footer>

</footer>

</html>
